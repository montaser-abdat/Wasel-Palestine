<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <link rel="stylesheet" href="/User/Pages/AlertsPage/AddSubscription.css" />
  
    <!-- Auth Guard -->
    <script type="module">
      import { checkAuth } from '/Js/authGuard.js';
      checkAuth();
    </script></head>

  <body class="alerts-add-subscription">
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Add Alert Subscription</h2>
          <button class="close-btn" aria-label="Close modal">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Select Area</label>
            <div class="select-wrapper">
              <select class="form-select">
                <option value="" disabled selected>Choose a region...</option>
                <option value="region1">North Region</option>
                <option value="region2">South Region</option>
                <option value="region3">East Region</option>
                <option value="region4">West Region</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Incident Categories</label>
            <div class="checkbox-grid">
              <label class="checkbox-card">
                <input type="checkbox" class="sr-only" checked />
                <div class="checkbox-custom"></div>
                <span class="checkbox-label">Road Closure</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" class="sr-only" checked />
                <div class="checkbox-custom"></div>
                <span class="checkbox-label">Delay</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" class="sr-only" />
                <div class="checkbox-custom"></div>
                <span class="checkbox-label">Accident</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" class="sr-only" />
                <div class="checkbox-custom"></div>
                <span class="checkbox-label">Weather Hazard</span>
              </label>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary">Cancel</button>
          <button class="btn btn-primary">Save Subscription</button>
        </div>
      </div>
    </div>
  </body>
</html>
