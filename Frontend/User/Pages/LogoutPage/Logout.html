<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Modal</title>
    <link rel="stylesheet" href="Logout.css">

    <!-- Auth Guard -->
    <script type="module">
      import { checkAuth } from '/Js/authGuard.js';
      checkAuth();
    </script></head>
<body class="logout-page-scope">

    <div class="modal-overlay">
        <div class="modal">
            <div class="icon-wrapper">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 20C11 20.5523 10.5523 21 10 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H10C10.5523 3 11 3.44772 11 4V20Z" fill="#df5242"/>
                    <path d="M9 12H20M20 12L16 8M20 12L16 16" stroke="#df5242" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            
            <h2 class="modal-title">Logout</h2>
            <p class="modal-text">Are you sure you want to logout?</p>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
                <button class="btn btn-logout" id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>
</body>
</html>
