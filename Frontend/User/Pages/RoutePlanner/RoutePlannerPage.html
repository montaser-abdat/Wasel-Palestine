<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Route Planner - Wasel Palestine</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="/commoncss/app-shell.css" />
    <link rel="stylesheet" href="/components/header/header.css" />
    <link rel="stylesheet" href="./RoutePlannerPage.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script>
      if (window.top === window) {
        window.location.replace("#route-planner");
      }
    </script>
  
    <!-- Auth Guard -->
    <script type="module">
      import { checkAuth } from '/Js/authGuard.js';
      checkAuth();
    </script></head>
  <body>
    <div id="spa-page-route-planner">
      <main class="app-layout">
        <aside class="sidebar">
          <div class="sidebar-content">
            <header class="sidebar-header">
              <h1>Plan Your Route</h1>
              <p>Find the safest path to your destination</p>
            </header>

            <div class="route-inputs-container">
              <div class="route-visual-indicator">
                <div class="dot dot-start"></div>
                <div class="map-dotted-line"></div>
                <div class="dot dot-end"></div>
              </div>

              <div class="input-fields">
                <div class="field-group">
                  <label>From</label>
                  <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-start"
                      >location_on</span
                    >
                    <input
                      type="text"
                      value="Ramallah Center"
                      placeholder="Current location"
                    />
                  </div>
                </div>

                <div class="field-group">
                  <label>To</label>
                  <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-end"
                      >location_on</span
                    >
                    <input
                      type="text"
                      value="Bethlehem Manger Square"
                      placeholder="Enter destination"
                    />
                  </div>
                </div>
              </div>
            </div>

            <section class="preferences">
              <h3>Route Preferences</h3>
              <div class="preference-list">
                <label class="preference-item">
                  <div class="pref-label">
                    <span class="material-symbols-outlined">shield</span>
                    <span>Avoid checkpoints</span>
                  </div>
                  <input type="checkbox" checked />
                </label>
                <label class="preference-item">
                  <div class="pref-label">
                    <span class="material-symbols-outlined">warning</span>
                    <span>Avoid restricted areas</span>
                  </div>
                  <input type="checkbox" checked />
                </label>
              </div>
            </section>

            <button class="btn-primary">Calculate Route</button>

            <section class="route-results">
              <div class="metrics-card">
                <div class="metric">
                  <span class="metric-label">Distance</span>
                  <span class="metric-value">23.4 km</span>
                </div>
                <div class="divider"></div>
                <div class="metric text-right">
                  <span class="metric-label">Duration</span>
                  <span class="metric-value">47 min</span>
                </div>
              </div>

              <div class="factors-list">
                <h3>Affecting Factors</h3>
                <div class="factor-pill factor-yellow">
                  <span class="material-symbols-outlined">security</span>
                  <p>2 active checkpoints along this route</p>
                </div>
                <div class="factor-pill factor-orange">
                  <span class="material-symbols-outlined">construction</span>
                  <p>Road construction near Bethlehem</p>
                </div>
                <div class="factor-pill factor-blue">
                  <span class="material-symbols-outlined">cloudy_snowing</span>
                  <p>Light rain expected in 2 hours</p>
                </div>
              </div>
            </section>
          </div>
        </aside>

        <section class="map-area">
          <div id="static-map" style="width: 100%; height: 100%"></div>
        </section>
      </main>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="/Js/api/map.shared.js"></script>
    <script src="/Js/api/map.widgets.js"></script>
    <script>
      window.AppMapWidgets?.initMapForRoute?.("route-planner");
    </script>
    <script src="/User/Pages/RoutePlanner/RoutePlannerPage.js"></script>
    <script src="/User/Pages/RoutePlanner/RoutePlannerPage.lifecycle.js"></script>
  </body>
</html>
