<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignIn_SignUp</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./signin_signup.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">
          <form action="" class="sign-in-form">
            <h2 class="title">Sign_in</h2>
            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Email" />
            </div>
            <div class="input-field password-field">
              <i class="fas fa-lock"></i>
              <input type="password" placeholder="Password" />
              <i class="fas fa-eye toggle-password"></i>
            </div>
            <input
              type="submit"
              value="Sign in"
              class="btn solid"
              id="signin_btn"
            />

            <p class="social-text">Or sign in with social networks</p>
            <div class="social-media">
              <a href="#" class="social-icon">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="fab fa-twitter"></i>
              </a>
              
        <a href="#" class="social-icon" id="google-signin-btn">
  <i class="fab fa-google"></i>
</a>

<a href="#" class="social-icon" id="linkedin-signin-btn">
  <i class="fab fa-linkedin-in"></i>
</a>
            </div>
          </form>

          <form action="" class="sign-up-form">
            <h2 class="title">Sign Up</h2>

            <div class="first-last">
              <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="First Name" />
              </div>

              <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Last Name" />
              </div>
            </div>

            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Email" />
            </div>
            <div class="input-field password-field">
              <i class="fas fa-lock"></i>
              <input type="password" placeholder="Password" />
              <i class="fas fa-eye toggle-password"></i>
            </div>

            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Phone(Optional)" />
            </div>

            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Address(Optional)" />
            </div>

            <input
              type="submit"
              value="Sign up"
              class="btn solid"
              id="signup_btn"
            />

            <p class="social-text">Or sign up with social networks</p>
            <div class="social-media">
              <a href="#" class="social-icon">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="fab fa-twitter"></i>
              </a>
           <a href="#" class="social-icon" id="google-signup-btn">
  <i class="fab fa-google"></i>
</a>

<a href="#" class="social-icon" id="linkedin-signup-btn">
  <i class="fab fa-linkedin-in"></i>
</a>
            </div>
          </form>
        </div>
      </div>

      <div class="panels-container">
        <div class="panel left-panel">
          <div class="content">
            <h3>New here?</h3>
            <p>Sign up now to create an account.</p>
            <button class="btn transparent" id="sign-up-btn">Sign Up</button>
          </div>

          <img
            src="/assets/images/undraw_fingerprint-login_19qv.svg"
            class="image"
            alt=""
          />
        </div>

        <div class="panel right-panel">
          <div class="content">
            <h3>One of us?</h3>
            <p>Sign in now to access your account.</p>
            <button class="btn transparent" id="sign-in-btn">Sign In</button>
          </div>

          <img
            src="/assets/images/undraw_workspace_s6wf.svg"
            class="image"
            alt=""
          />
        </div>
      </div>
    </div>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Config -->
    <script src="/core/config/constants.js"></script>

    <!-- API -->
    <script src="/core/api/authApi.js"></script>

    <!-- Notifications -->
    <script src="/shared/ui-kit/notifications/alerts.js"></script>

    <!-- Helpers -->
    <script src="/core/helpers/errorHelper.js"></script>
    <script src="/core/helpers/formHelper.js"></script>

    <!-- Validation -->
    <script src="/core/validation/validators.js"></script>

    <!-- Components -->
    <script src="/shared/ui-kit/forms/panelToggle.js"></script>
    <script src="/shared/ui-kit/forms/passwordToggle.js"></script>

    <!-- Handlers -->
    <script type="module" src="/features/public/auth/signInHandler.js"></script>
    <script type="module" src="/features/public/auth/signUpHandler.js"></script>
    <script type="module" src="/core/auth/authService.js"></script>
    <script type="module" src="/core/api/redirectUserBasedOnRule.js"></script>
    <script type="module" src="/features/public/auth/socialAuthHandler.js"></script>
  </body>
</html>
