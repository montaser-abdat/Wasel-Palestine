<div class="add-user-card">
    <div class="modal-header">
        <h2 class="modal-title">Add New User</h2>
        <button type="button" class="btn-close" id="addUserCloseBtn" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <form id="addUserForm" novalidate>
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">person</span>
                    <input type="text" id="firstName" placeholder="First name..." class="pl-10" required />
                </div>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">person</span>
                    <input type="text" id="lastName" placeholder="Last name..." class="pl-10" required />
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="userEmail">Email Address <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">mail</span>
                    <input type="email" id="userEmail" placeholder="Email address..." class="pl-10" required />
                </div>
            </div>
            <div class="form-group">
                <label for="userPassword">Password <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">lock</span>
                    <input type="password" id="userPassword" placeholder="Create password..." class="pl-10" required />
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="userRole">Role <span class="text-danger">*</span></label>
                <div class="select-wrapper relative-wrapper">
                    <select id="userRole" required>
                        <option value="" disabled selected>Select role...</option>
                        <option value="admin">Admin</option>
                        <option value="citizen">Citizen</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="userPhone">Phone Number</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">phone</span>
                    <input type="tel" id="userPhone" placeholder="Phone number (optional)" class="pl-10" />
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="userAddress">Address</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon-left">home</span>
                    <input type="text" id="userAddress" placeholder="Home address (optional)" class="pl-10" />
                </div>
            </div>
        </div>

        <div class="form-actions mt-4">
            <button type="button" class="btn-cancel-text" id="addUserCancelBtn">Cancel</button>
            <button type="submit" class="btn-primary" id="addUserSaveBtn">Add User</button>
        </div>
    </form>
</div>
