<div class="create-incident-card">
    <div class="modal-header">
        <h2 class="modal-title">Create New Incident</h2>
        <button type="button" class="btn-close" id="createIncidentCloseBtn" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <form id="createIncidentForm">
        <div class="form-group">
            <label for="incidentTitle">Title <span class="text-danger">*</span></label>
            <input type="text" id="incidentTitle" placeholder="Enter incident title..." required />
        </div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label for="incidentType">Type <span class="text-danger">*</span></label>
                <div class="select-wrapper relative-wrapper">
                    <select id="incidentType" required>
                        <option value="" disabled selected hidden>Select type</option>
                        <option value="closure">Closure</option>
                        <option value="delay">Delay</option>
                        <option value="accident">Accident</option>
                        <option value="weather">Weather</option>
                    </select>
                </div>
            </div>
            <div class="form-group flex-1">
                <label for="incidentSeverity">Severity <span class="text-danger">*</span></label>
                <div class="select-wrapper relative-wrapper">
                    <select id="incidentSeverity" required>
                        <option value="" disabled selected hidden>Select severity</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="incidentLocation">Location <span class="text-danger">*</span></label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined icon-left">location_on</span>
                <input type="text" id="incidentLocation" placeholder="Enter location..." class="pl-10" required />
            </div>
        </div>

        <div class="form-group">
            <label for="incidentDescription">Description <span class="text-danger">*</span></label>
            <textarea id="incidentDescription" rows="3" placeholder="Describe the incident..." required></textarea>
        </div>

        <div class="form-group">
            <label for="incidentStatus">Status</label>
            <div class="select-wrapper relative-wrapper">
                <select id="incidentStatus">
                    <option value="active" selected>Active</option>
                    <option value="verified">Verified</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
        </div>

        <div class="form-actions mt-4">
            <button type="button" class="btn-cancel-text" id="createIncidentCancelBtn">Cancel</button>
            <button type="submit" class="btn-primary">Save Incident</button>
        </div>
    </form>
</div>
