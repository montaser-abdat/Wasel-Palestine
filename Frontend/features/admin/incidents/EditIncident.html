<div class="edit-incident-card">
    <div class="modal-header">
        <h2 class="modal-title">Update Incident</h2>
        <button type="button" class="btn-close" id="editIncidentCloseBtn" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <form id="editIncidentForm" novalidate>
        <div class="form-group">
            <label for="editIncidentTitle">Title <span class="text-danger">*</span></label>
            <input type="text" id="editIncidentTitle" placeholder="Enter incident title..." required />
        </div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label for="editIncidentType">Type <span class="text-danger">*</span></label>
                <div class="select-wrapper relative-wrapper">
                    <select id="editIncidentType" required>
                        <option value="" disabled selected hidden>Select type</option>
                        <option value="CLOSURE">Closure</option>
                        <option value="DELAY">Delay</option>
                        <option value="ACCIDENT">Accident</option>
                        <option value="WEATHER_HAZARD">Weather</option>
                    </select>
                </div>
            </div>
            <div class="form-group flex-1">
                <label for="editIncidentSeverity">Severity <span class="text-danger">*</span></label>
                <div class="select-wrapper relative-wrapper">
                    <select id="editIncidentSeverity" required>
                        <option value="" disabled selected hidden>Select severity</option>
                        <option value="CRITICAL">Critical</option>
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="editIncidentLocation">Location</label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined icon-left">location_on</span>
                <input type="text" id="editIncidentLocation" placeholder="Enter checkpoint ID or location..." class="pl-10" required />
            </div>
        </div>

        <div class="form-group">
            <label for="editIncidentDescription">Description <span class="text-danger">*</span></label>
            <textarea id="editIncidentDescription" rows="3" placeholder="Describe the incident..." required></textarea>
        </div>

        <div class="form-group">
            <label for="editIncidentStatus">Status</label>
            <div class="select-wrapper relative-wrapper">
                <select id="editIncidentStatus">
                    <option value="ACTIVE" selected>Active</option>
                    <option value="VERIFIED">Verified</option>
                    <option value="CLOSED">Closed</option>
                </select>
            </div>
        </div>

        <div class="form-actions mt-4">
            <button type="button" class="btn-cancel-text" id="editIncidentCancelBtn">Cancel</button>
            <button type="submit" class="btn-primary" id="editIncidentSaveBtn">Save Changes</button>
        </div>
    </form>
</div>
