<div class="add-checkpoint-card">
    <div class="modal-header">
        <h2 class="modal-title">Add New Checkpoint</h2>
        <button type="button" class="btn-close" id="addCheckpointCloseBtn" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <form id="addCheckpointForm" novalidate>
        <div class="form-group">
            <label for="cpName">Checkpoint Name <span class="text-danger">*</span></label>
            <input type="text" id="cpName" placeholder="Enter checkpoint name..." required />
        </div>

        <div class="form-group">
            <label for="cpLocation">Location <span class="text-danger">*</span></label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined icon-left">location_on</span>
                <input type="text" id="cpLocation" placeholder="Enter location..." class="pl-10" required />
            </div>
        </div>



        <div class="form-group">
            <label for="cpStatus">Status <span class="text-danger">*</span></label>
            <div class="select-wrapper relative-wrapper">
                <select id="cpStatus" required>
                    <option value="ACTIVE" selected>Open</option>
                    <option value="DELAYED">Delayed</option>
                    <option value="RESTRICTED">Restricted</option>
                    <option value="CLOSED">Closed</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="cpNotes">Notes</label>
            <textarea id="cpNotes" rows="3" placeholder="Additional notes about this checkpoint..."></textarea>
        </div>

        <div class="form-actions mt-4">
            <button type="button" class="btn-cancel-text" id="addCheckpointCancelBtn">Cancel</button>
            <button type="submit" class="btn-primary">Save Checkpoint</button>
        </div>
    </form>
</div>
