<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <link rel="stylesheet" href="SubmitReport.css" />
  
    <!-- Auth Guard -->
    <script type="module">
      import { checkAuth } from '/core/auth/authGuard.js';
      checkAuth();
    </script></head>
  <body>
    <div class="modal-bg-effect"></div>
    <main class="submit-report-container">
      

      <div class="form-card">
        <form data-report-form>
          <div class="form-group">
            <label class="form-label">
              Category <span class="required">*</span>
            </label>
            <select class="form-control select-icon" data-report-category>
              <option disabled selected value="">Select a category</option>
              <option value="road_closure">Road Closure</option>
              <option value="delay">Delay</option>
              <option value="accident">Accident</option>
              <option value="hazard">Weather Hazard</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">
              Location <span class="required">*</span>
            </label>
            <div class="input-with-icon">
              <span class="material-symbols-outlined icon">location_on</span>
              <input
                class="form-control pl-icon"
                placeholder="Enter address..."
                type="text"
                data-report-location
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              Description <span class="required">*</span>
            </label>
            <textarea
              class="form-control textarea-resize"
              placeholder="Describe what you observed in detail..."
              data-report-description
            ></textarea>
            <div class="char-count" data-report-char-count>0 / 500</div>
          </div>

          <div class="form-group">
            <label class="form-label">Date & Time</label>
            <div class="date-time-group">
              <input class="form-control" type="date" value="2026-03-12" data-report-date />
              <input class="form-control" type="time" value="10:30" data-report-time />
            </div>
            <p class="helper-text">Auto-filled with current date and time</p>
          </div>

          <div class="warning-banner" data-report-warning hidden>
            <span class="material-symbols-outlined warning-icon">warning</span>
            <span class="warning-text" data-report-warning-text
              >A similar report was added recently with the same
              information.</span
            >
          </div>

          <div class="form-actions">
            <button
              class="btn btn-secondary"
              type="button"
              onclick="closeMyReportModal()"
            >
              Cancel
            </button>
            <button class="btn btn-primary" type="submit">Submit Report</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
