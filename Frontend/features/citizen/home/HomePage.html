<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  img-src 'self' data:;
  connect-src 'self' http://127.0.0.1:5500;
">
    <title>Wasel Palestine | Mobility Platform</title>

    <!-- Google Fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
    />

    <!-- Material Symbols -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="/views/citizen/shell/app-shell.css" />
    <link rel="stylesheet" href="/views/citizen/header/header.css" />
    <link rel="stylesheet" href="/features/citizen/home/HomePage.css" />
  
    <!-- Auth Guard -->
    <script type="module">
      import { checkAuth } from '/core/auth/authGuard.js';
      checkAuth();
    </script></head>

  <body>
    <div id="spa-page-home">
      <!-- =====================================================
         Map Area
    ====================================================== -->
      <main class="map-area" aria-label="Interactive map" id="flexible_main">
        <!-- Map canvas -->
        <div
          class="map-area"
          role="img"
          aria-label="Map of Palestine with incident markers"
          id="map"
        ></div>

        <!-- ===================================================
           Filter Panel
      ==================================================== -->
      <button class="show-panel-btn" aria-label="Show filter panel" onclick="showFilter()">
        <span class="material-symbols-outlined" aria-hidden="true">filter_list</span>
      </button>
        <aside class="filter-panel" aria-label="Filter incidents">
          <div class="panel-header">
            <h2 class="panel-title">Filters</h2>
            <button class="close-btn" aria-label="Close filter panel" onclick="closeFilter()">
              <span class="material-symbols-outlined" aria-hidden="true"
                >close</span
              >
            </button>
          </div>

          <!-- Incident Type -->
          <div class="filter-section">
            <p class="section-label" id="incident-type-label">INCIDENT TYPE</p>
            <div
              class="checkbox-group"
              role="group"
              aria-labelledby="incident-type-label"
            >
              <label>
                <input
                  type="checkbox"
                  name="type"
                  value="road-closure"
                  checked
                />
                <span class="checkmark"></span>
                Road Closure
              </label>
              <label>
                <input type="checkbox" name="type" value="delay" />
                <span class="checkmark"></span>
                Delay
              </label>
              <label>
                <input type="checkbox" name="type" value="accident" />
                <span class="checkmark"></span>
                Accident
              </label>
              <label>
                <input type="checkbox" name="type" value="weather-hazard" />
                <span class="checkmark"></span>
                Weather Hazard
              </label>
            </div>
          </div>

          <!-- Severity -->
          <div class="filter-section">
            <label class="section-label" for="severity-select">SEVERITY</label>
            <select
              id="severity-select"
              class="filter-select arrow"
              name="severity"
            >
              <option value="">All Severities</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>

          <!-- Date Range -->
          <div class="filter-section">
            <p class="section-label">DATE RANGE</p>
            <div class="date-range">
              <div class="date-input">
                <span class="date-sublabel" id="from-label">From</span>
                <input
                  type="date"
                  name="date-from"
                  aria-labelledby="from-label"
                />
              </div>
              <div class="date-input">
                <span class="date-sublabel" id="to-label">To</span>
                <input type="date" name="date-to" aria-labelledby="to-label" />
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="panel-actions">
            <button type="button" class="apply-btn">Apply Filters</button>
            <button type="button" class="clear-btn">Clear</button>
          </div>
        </aside>

        <!-- ===================================================
           Weather Widget
      ==================================================== -->
        <aside class="weather-widget" aria-label="Current weather">
          <div class="weather-top">
            <span
              class="material-symbols-outlined weather-icon fill-1"
              aria-hidden="true"
              >wb_sunny</span
            >
            <span class="weather-temp">22°C</span>
          </div>
          <div class="weather-desc">Partly Cloudy</div>
          <div class="weather-wind">
            <span class="material-symbols-outlined" aria-hidden="true"
              >air</span
            >
            <span>12 km/h</span>
          </div>
        </aside>

        <!-- ===================================================
           Legend Card
      ==================================================== -->
        <aside class="legend-card" aria-label="Map legend">
          <ul class="legend-list" role="list">
            <li class="legend-item">
              <span
                class="legend-dot legend-dot--open"
                aria-hidden="true"
              ></span>
              Open
            </li>
            <li class="legend-item">
              <span
                class="legend-dot legend-dot--delayed"
                aria-hidden="true"
              ></span>
              Delayed
            </li>
            <li class="legend-item">
              <span
                class="legend-dot legend-dot--closed"
                aria-hidden="true"
              ></span>
              Closed
            </li>
            <li class="legend-item">
              <span
                class="legend-shape legend-shape--incident"
                aria-hidden="true"
              ></span>
              Accidents
            </li>
          </ul>
        </aside>

        <!-- ===================================================
           FAB
      ==================================================== -->
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/core/map/map.shared.js"></script>
    <script src="/core/map/map.geolocation.js"></script>
    <script src="/core/map/map.widgets.js"></script>
    <script src="/core/api/Weather.js"></script>
    <script src="/features/citizen/home/CloseFilterPage.js"></script>
    <script src="/features/citizen/home/OpenFilterPage.js"></script>
    <script>
      window.AppMapWidgets?.initMapForRoute?.("home");
      window.initWeatherWidget?.();
    </script>
  </body>
</html>
