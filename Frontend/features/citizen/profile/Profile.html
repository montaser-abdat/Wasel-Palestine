<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
  />
  <link rel="stylesheet" href="Profile.css" />

  <script type="module">
    import { checkAuth } from '/core/auth/authGuard.js';
    checkAuth();
  </script>
</head>
<body class="profile-page-scope">
  <div class="profile-card">
    <div class="avatar-section">
      <div class="avatar-circle">U</div>
      <h2 class="profile-name" data-profile-name>Loading profile</h2>
      <p class="profile-meta" data-profile-meta>Checking authenticated session</p>
      <a href="#" class="change-photo-link">Change photo</a>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </div>

    <form id="profileSettingsForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" value="" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input
            type="email"
            id="email"
            value=""
            class="input-disabled pr-10"
            disabled
            autocomplete="email"
          />
          <span class="material-symbols-outlined icon-right">lock</span>
        </div>
        <div class="helper-text">
          <span class="material-symbols-outlined help-icon">info</span>
          Email cannot be changed
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined icon-left">call</span>
          <input type="tel" id="phone" value="" class="pl-10" autocomplete="tel" />
        </div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" value="" autocomplete="street-address" />
      </div>

      <div class="form-group">
        <label for="language">Application Language</label>
        <select id="language" class="profile-select" autocomplete="off">
          <option value="English">English</option>
          <option value="Arabic">Arabic</option>
        </select>
      </div>

      <div class="section-divider">
        <div class="section-title">
          <span class="material-symbols-outlined">update</span>
          <h2>Change Password</h2>
        </div>
      </div>

      <div class="password-fields">
        <div class="form-group">
          <label for="currentPassword" class="label-uppercase">Current Password</label>
          <div class="input-wrapper password-input-wrapper">
            <input
              type="password"
              id="currentPassword"
              value=""
              placeholder="Enter current password"
              class="pr-10"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="password-toggle"
              data-target="currentPassword"
              aria-label="Show password"
            >
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="newPassword" class="label-uppercase">New Password</label>
          <div class="input-wrapper password-input-wrapper">
            <input
              type="password"
              id="newPassword"
              value=""
              placeholder="Create a stronger password"
              class="pr-10"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              data-target="newPassword"
              aria-label="Show password"
            >
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>

          <div class="password-strength">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <div class="strength-text">Enter a new password</div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="label-uppercase">Confirm New Password</label>
          <div class="input-wrapper password-input-wrapper">
            <input
              type="password"
              id="confirmPassword"
              value=""
              placeholder="Repeat the new password"
              class="pr-10"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              data-target="confirmPassword"
              aria-label="Show password"
            >
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>
        </div>
      </div>

      <div class="profile-status-note" data-profile-status>
        Loading your account information...
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</body>
<script src="/core/i18n/user-language.js?v=profile-language-layout-20260417-1"></script>
<script src="/features/citizen/profile/Profile.js?v=profile-language-20260417-1"></script>
<script src="/features/citizen/profile/ApplyHeaderAvatar.js?v=profile-db-save-20260417-2"></script>
<script src="/features/citizen/profile/AvatarUpload.js?v=profile-db-save-20260417-2"></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    if (window.initProfilePage) {
      window.initProfilePage();
    }
  });
</script>
</html>
