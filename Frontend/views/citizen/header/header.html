  <body>
    <header class="header-component" role="banner">
      <a
        href="#home"
        class="header-component__logo"
        aria-label="Wasel Palestine Home"
      >
        <span
          class="material-symbols-outlined header-component__logo-icon"
          aria-hidden="true"
          >shield</span
        >
        <span class="header-component__logo-text">Wasel Palestine</span>
      </a>

      <button
        type="button"
        class="header-component__menu-toggle"
        aria-expanded="false"
        aria-controls="header-component-nav"
        aria-label="Toggle navigation"
      >
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>

      <nav
        id="header-component-nav"
        class="header-component__nav"
        aria-label="Main navigation"
      >
        <a
          href="#home"
          data-route="home"
          class="header-component__nav-link active"
          onclick="route(event)"
          >Home</a
        >
        <a
          href="#incidents"
          data-route="incidents"
          class="header-component__nav-link"
          onclick="route(event)"
          >Incidents</a
        >
        <a
          href="#route-planner"
          data-route="route-planner"
          class="header-component__nav-link"
          onclick="route(event)"
          >Route Planner</a
        >
        <a
          href="#my-reports"
          data-route="my-reports"
          class="header-component__nav-link"
          onclick="route(event)"
          >My Reports</a
        >
        <a
          href="#alerts"
          data-route="alerts"
          class="header-component__nav-link"
          onclick="route(event)"
          >Alerts<span
            class="header-component__alerts-badge"
            data-alerts-unread-badge
            hidden
            >0</span
          ></a
        >
      </nav>

      <div class="header-component__actions" aria-label="User actions">
        <button id="theme-switch">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="#1f1f1f"
          >
            <path
              d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"
            />

          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="#1f1f1f"
          >
            <path
              d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"
            />
          </svg>
        </button>

        <button
          class="header-component__avatar"
          type="button"
          aria-label="User menu"
        >
          U
        </button>
      </div>
    </header>

    <div class="flexible-main" id="flexible_main"></div>
