<div class="profile-card">
    <div class="avatar-section">
        <div class="avatar-circle">AM</div>
        <a href="#" class="change-photo-link">Change photo</a>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <form id="profileSettingsForm">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" value="Ahmad Mahmoud" />
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input type="email" id="email" value="ahmad.m@email.com" class="input-disabled pr-10" disabled />
                <span class="material-symbols-outlined icon-right">lock</span>
            </div>
            <div class="helper-text">
                <span class="material-symbols-outlined help-icon">info</span>
                Email cannot be changed
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined icon-left">call</span>
                <input type="tel" id="phone" value="+970 599 123 456" class="pl-10" />
            </div>
        </div>

        <div class="section-divider">
            <div class="section-title">
                <span class="material-symbols-outlined">update</span>
                <h2>Change Password</h2>
            </div>
        </div>

        <div class="password-fields">
            <div class="form-group">
                <label for="currentPassword" class="label-uppercase">Current Password</label>
                <div class="input-wrapper password-input-wrapper">
                    <input type="password" id="currentPassword" value="........" class="pr-10" />
                    <button type="button" class="password-toggle" data-target="currentPassword" aria-label="Show password">
                        <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword" class="label-uppercase">New Password</label>
                <div class="input-wrapper password-input-wrapper">
                    <input type="password" id="newPassword" value="........" class="pr-10" />
                    <button type="button" class="password-toggle" data-target="newPassword" aria-label="Show password">
                        <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                    </button>
                </div>
                
                <div class="password-strength">
                    <div class="strength-bar active"></div>
                    <div class="strength-bar active"></div>
                    <div class="strength-bar active"></div>
                    <div class="strength-bar"></div>
                </div>
                <div class="strength-text">Strong Password</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="label-uppercase">Confirm New Password</label>
                <div class="input-wrapper password-input-wrapper">
                    <input type="password" id="confirmPassword" value="........" class="pr-10" />
                    <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Show password">
                        <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <!-- Included a unique ID so the modal JS can easily hook the cancel event -->
            <button type="button" class="btn-cancel" id="profileModalCancelBtn">Cancel</button>
            <button type="submit" class="btn-primary">Save Changes</button>
        </div>
    </form>
</div>
